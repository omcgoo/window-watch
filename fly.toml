app = "window-watch-ollie"
primary_region = "lhr"

[build]
  dockerfile = "Dockerfile"

[env]
  TZ = "Europe/London"
  BUILDING_PROFILE = "uninsulated"
  # Measured off the map: the south windows face exactly 160°. Drives all live solar
  # projections and advisory timing; the daily refit also reports an *effective*
  # bearing (~139° — east of geometric because the solid wall responds with a lag).
  FACADE_AZ = "160"

[[mounts]]
  source = "window_watch_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  auto_stop_machines = "off"
  auto_start_machines = false
  force_https = true

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
