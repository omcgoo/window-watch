app = "window-watch-ollie"
primary_region = "lhr"

[build]
  dockerfile = "Dockerfile"

[env]
  TZ = "Europe/London"
  BUILDING_PROFILE = "uninsulated"

[[mounts]]
  source = "window_watch_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  auto_stop_machines = "off"
  auto_start_machines = false
  force_https = true

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
