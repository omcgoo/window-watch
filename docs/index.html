<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Window Watch</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: background 0.6s ease, color 0.6s ease;
      padding: 24px;
    }

    body.open    { background: #0f3460; color: #e0f0ff; }
    body.close   { background: #7b1e1e; color: #ffe8e8; }
    body.unknown { background: #1a1a2e; color: #aaa; }

    .card {
      width: 100%;
      max-width: 420px;
      text-align: center;
    }

    .status {
      font-size: clamp(56px, 18vw, 96px);
      font-weight: 800;
      letter-spacing: -2px;
      line-height: 1;
      margin-bottom: 8px;
    }

    .hint {
      font-size: 16px;
      opacity: 0.6;
      margin-bottom: 40px;
    }

    .temp {
      font-size: clamp(40px, 12vw, 64px);
      font-weight: 300;
      letter-spacing: -1px;
      margin-bottom: 4px;
    }

    .temp span { opacity: 0.5; font-size: 0.55em; vertical-align: super; }

    .temp-sub {
      font-size: 15px;
      opacity: 0.55;
      margin-bottom: 32px;
    }

    .thresholds {
      font-size: 13px;
      opacity: 0.35;
      margin-bottom: 32px;
    }

    .solar-advisory {
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 32px;
      padding: 12px 16px;
      border-radius: 10px;
      background: rgba(255,180,40,0.16);
      border: 1px solid rgba(255,180,40,0.3);
      text-align: left;
    }
    .solar-advisory .sa-title {
      font-size: 10px; opacity: 0.55; letter-spacing: 0.04em;
      text-transform: uppercase; margin-bottom: 6px;
    }
    /* One line per action: what to do in bold, why in normal weight */
    .solar-advisory .sa-act { padding: 3px 0; }
    .solar-advisory .sa-act b { font-weight: 700; }
    .solar-advisory .sa-act.soft { opacity: 0.75; font-size: 13px; }
    .solar-advisory .sub { display: block; margin-top: 6px; font-size: 11px; opacity: 0.5; }
    /* Callouts sit side by side when both fire; single card spans full width */
    .sa-row { display: grid; grid-template-columns: 1fr; gap: 12px; margin-bottom: 12px; }
    .sa-row.dual { grid-template-columns: 1fr 1fr; }
    .solar-advisory.sa-card {
      margin-bottom: 0; display: flex; flex-direction: column;
      font-size: 13px;
    }
    /* Big leading icon so it's instantly clear which control the card is about */
    .sa-icon { font-size: 30px; line-height: 1; margin-bottom: 8px; }
    /* The confirm nudge docks inside its callout while it's active */
    .sa-log:empty { display: none; }
    .sa-log { margin-top: auto; padding-top: 8px; border-top: 1px solid rgba(255,180,40,0.25); }
    .sa-log > * { margin-top: 8px; }
    .sa-log .winlog { margin-bottom: 0; margin-top: 0; justify-content: flex-start; }
    @media (max-width: 480px) { .sa-row.dual { grid-template-columns: 1fr; } }

    .forecast {
      font-size: 15px;
      opacity: 0.75;
      margin-bottom: 8px;
      padding: 12px 16px;
      border-radius: 10px;
      background: rgba(255,255,255,0.08);
      line-height: 1.5;
      margin-bottom: 32px;
    }

    .forecast strong { opacity: 1; }
    .forecast.warn { background: rgba(255,200,0,0.12); }
    .forecast-peak { margin-top: 8px; padding-top: 8px; border-top: 1px solid rgba(255,255,255,0.1); font-size: 13px; opacity: 0.5; }

    .updated {
      font-size: 12px;
      opacity: 0.35;
    }

    .balance { width: 100%; margin-bottom: 32px; }
    .balance-track {
      position: relative; height: 6px; border-radius: 3px;
      background: rgba(255,255,255,0.12); margin: 10px 0 8px;
    }
    .balance-bg-cool {
      position: absolute; left: 0; top: 0; bottom: 0; width: 50%;
      background: rgba(77,182,255,0.25); border-radius: 3px 0 0 3px;
    }
    .balance-bg-warm {
      position: absolute; right: 0; top: 0; bottom: 0; width: 50%;
      background: rgba(255,120,100,0.25); border-radius: 0 3px 3px 0;
    }
    .balance-deadband {
      position: absolute; top: -2px; bottom: -2px; border-radius: 1px;
      background: rgba(255,255,255,0.06);
      border-left: 1px solid rgba(255,255,255,0.12);
      border-right: 1px solid rgba(255,255,255,0.12);
    }
    .balance-needle {
      position: absolute; left: 50%; top: -4px; bottom: -4px; width: 1.5px;
      transform: translateX(-50%); background: rgba(255,255,255,0.45); border-radius: 1px;
    }
    .balance-fill {
      position: absolute; top: 0; bottom: 0; border-radius: 3px;
      transition: left 0.5s ease, width 0.5s ease, background 0.4s ease;
    }
    .balance-ball {
      position: absolute; top: 50%; width: 14px; height: 14px; border-radius: 50%;
      transform: translate(-50%, -50%);
      border: 2px solid rgba(0,0,0,0.2);
      transition: left 0.5s ease, background 0.4s ease;
    }
    .balance-labels {
      display: flex; justify-content: space-between;
      font-size: 11px; opacity: 0.35;
    }
    .balance-temps {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 12px; opacity: 0.55;
    }
    .balance-delta { font-size: 12px; opacity: 0.55; }

    .refresh-btn {
      margin-top: 20px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: inherit;
      font-size: 13px;
      padding: 8px 18px;
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .refresh-btn:hover { background: rgba(255,255,255,0.18); }
    .refresh-btn:active { background: rgba(255,255,255,0.08); }
    .refresh-btn:disabled { opacity: 0.4; cursor: default; }
    #checked { margin-left: 8px; opacity: 0.55; }

    .winlog {
      display: flex; align-items: center; justify-content: center;
      gap: 8px; flex-wrap: wrap; margin-bottom: 18px; font-size: 13px;
      min-height: 30px;
    }
    .winlog .wl-q { opacity: 0.75; }
    .winlog .wl-q b, .winlog .wl-state b { font-weight: 700; }
    .winlog .wl-state { opacity: 0.5; }
    .winlog.confirmed .wl-state b { color: #7fd18b; opacity: 1; }
    .wl-btn {
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.22);
      color: inherit; font-size: 12px; padding: 4px 13px; border-radius: 13px;
      cursor: pointer; transition: background 0.2s;
    }
    .wl-btn:hover { background: rgba(255,255,255,0.2); }
    .wl-btn.ghost { opacity: 0.55; }
    .wl-mini {
      background: none; border: none; color: inherit; opacity: 0.4;
      font-size: 11px; text-decoration: underline; cursor: pointer; padding: 2px 4px;
    }
    .wl-mini:hover { opacity: 0.7; }

    .chart-wrap {
      width: 100%;
      height: 160px;
      margin-top: 28px;
      position: relative;
    }

    .model-accuracy {
      width: 100%; margin-top: 12px; text-align: center;
      font-size: 11px; opacity: 0.55; line-height: 1.4;
    }
    .model-accuracy .dotc {
      display: inline-block; width: 6px; height: 6px; border-radius: 50%;
      margin-right: 5px; vertical-align: middle;
    }
    .model-accuracy strong { font-weight: 600; opacity: 0.9; }
    .model-accuracy .sub { display: block; opacity: 0.7; font-size: 10px; margin-top: 2px; }

    .thermal {
      width: 100%; margin-top: 18px; padding: 12px 16px; border-radius: 10px;
      background: rgba(255,255,255,0.05); font-size: 12px; text-align: left;
    }
    .thermal .th-title {
      font-size: 10px; opacity: 0.45; letter-spacing: 0.04em;
      text-transform: uppercase; margin-bottom: 8px;
    }
    /* One trait = bold behaviour + one supporting sentence */
    .thermal .th-trait { margin-top: 10px; }
    .thermal .th-trait:first-of-type { margin-top: 2px; }
    .thermal .th-trait-name { font-size: 13px; font-weight: 600; }
    .thermal .th-trait-body { font-size: 11px; opacity: 0.6; line-height: 1.5; margin-top: 2px; }
    /* Open-vs-shut pace, as proportional bars */
    .thermal .th-bar-row {
      display: grid; grid-template-columns: 34px 1fr; align-items: center;
      gap: 8px; padding: 2px 0;
    }
    .thermal .th-bar-row:first-of-type { margin-top: 6px; }
    .thermal .th-bar-label { font-size: 10px; opacity: 0.5; text-align: right; }
    .thermal .th-bar-track { display: block; position: relative; }
    .thermal .th-bar-fill {
      display: block; height: 8px; border-radius: 4px;
      background: linear-gradient(90deg, rgba(77,182,255,0.9), rgba(77,182,255,0.45));
    }
    .thermal .th-bar-fill.slow { background: linear-gradient(90deg, rgba(255,176,97,0.85), rgba(255,176,97,0.4)); }
    .thermal .th-note { margin-top: 8px; font-size: 11px; opacity: 0.45; line-height: 1.45; }
    /* Engineering figures live behind a tap */
    .thermal details { margin-top: 10px; }
    .thermal summary {
      cursor: pointer; font-size: 10px; opacity: 0.45; letter-spacing: 0.04em;
      text-transform: uppercase; list-style: none; user-select: none;
    }
    .thermal summary::-webkit-details-marker { display: none; }
    .thermal summary::after { content: " ▸"; }
    .thermal details[open] summary::after { content: " ▾"; }
    .thermal .th-eng {
      margin-top: 6px; padding-top: 6px; border-top: 1px solid rgba(255,255,255,0.08);
      font-size: 11px; opacity: 0.7; text-align: left;
    }
    .thermal .th-eng .th-row {
      display: flex; justify-content: space-between; gap: 12px; padding: 2px 0;
    }
    .thermal .th-eng .th-row span:first-child { white-space: nowrap; }
    .thermal .th-eng .th-row span:last-child { text-align: right; }

    .wetbulb { width: 100%; margin-top: 32px; }
    .wetbulb-head {
      display: flex; justify-content: space-between; align-items: baseline;
      margin-bottom: 8px;
    }
    .wetbulb-title { font-size: 12px; opacity: 0.5; letter-spacing: 0.02em; }
    .wetbulb-value { font-size: 14px; font-weight: 600; }
    .wetbulb-value span { opacity: 0.5; font-weight: 400; }
    /* The bar's 0–100% maps wet-bulb 18→28° (the danger line), so the marker sits at
       exactly the mugginess % shown. Colour boundaries match the comfort bands:
       comfortable<22 (40%), muggy<26 (80%), caution→danger at 28 (100%). */
    .wetbulb-scale-wrap { position: relative; height: 8px; margin-top: 14px; }
    .wetbulb-scale {
      position: absolute; inset: 0; border-radius: 4px; overflow: hidden;
      background: linear-gradient(to right,
        #3a7bd5 0%,        /* fresh (18°) */
        #5cae8e 40%,       /* comfortable → muggy (22°) */
        #d9b54a 64%,       /* mid-muggy */
        #e08a3c 80%,       /* muggy → caution (26°) */
        #d04a3c 100%);     /* caution → danger line (28°) */
    }
    .wetbulb-marker {
      position: absolute; top: -4px; bottom: -4px; width: 3px;
      transform: translateX(-50%); background: #fff; border-radius: 2px;
      box-shadow: 0 0 0 1.5px rgba(0,0,0,0.45);
      transition: left 0.5s ease;
    }
    /* Today's projected peak — a lighter ghost line with a hollow ring, clearly
       secondary to the solid "now" marker. */
    .wetbulb-peak {
      position: absolute; top: -4px; bottom: -4px; width: 2px;
      transform: translateX(-50%); background: rgba(255,255,255,0.4); border-radius: 2px;
      transition: left 0.5s ease;
    }
    .wetbulb-peak::after {
      content: ""; position: absolute; top: -6px; left: 50%; transform: translateX(-50%);
      width: 5px; height: 5px; border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.65); background: transparent;
    }
    .wetbulb-ticks {
      position: relative; height: 14px; margin-top: 6px; font-size: 10px; opacity: 0.35;
    }
    .wetbulb-ticks span { position: absolute; transform: translateX(-50%); white-space: nowrap; }
    .wetbulb-readout { margin-top: 8px; font-size: 13px; opacity: 0.7; text-align: center; }
    .wetbulb-readout.alert { opacity: 1; color: #ffd0d0; font-weight: 600; }
    .wetbulb-foot { margin-top: 4px; font-size: 10px; opacity: 0.28; text-align: center; }

    .dot {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: currentColor;
      margin-right: 6px;
      vertical-align: middle;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.9; }
    }
  </style>
</head>
<body class="unknown">
  <div class="card">
    <div class="status" id="status">—</div>
    <div class="hint" id="hint">loading…</div>
    <div class="temp" id="temp">—<span>°</span></div>
    <div class="temp-sub" id="temp-sub"></div>
    <div class="balance" id="balance" style="display:none">
      <div class="balance-track">
        <div class="balance-bg-cool"></div>
        <div class="balance-bg-warm"></div>
        <div class="balance-deadband" id="balance-deadband"></div>
        <div class="balance-fill" id="balance-fill"></div>
        <div class="balance-needle"></div>
        <div class="balance-ball" id="balance-ball"></div>
      </div>
      <div class="balance-labels">
        <span>← open</span>
        <span>equilibrium</span>
        <span>close →</span>
      </div>
      <div class="balance-temps" style="margin-top:6px">
        <span id="balance-indoor-label"></span>
        <span id="balance-outdoor-label"></span>
      </div>
    </div>
    <!-- Two distinct solar callouts; each adopts its confirm nudge while active -->
    <div class="sa-row" id="sa-row">
      <div class="solar-advisory sa-card" id="sa-blinds" style="display:none">
        <div id="sa-blinds-text"></div>
        <div class="sa-log" id="sa-blinds-log"></div>
      </div>
      <div class="solar-advisory sa-card" id="sa-windows" style="display:none">
        <div id="sa-windows-text"></div>
        <div class="sa-log" id="sa-windows-log"></div>
      </div>
    </div>
    <div class="forecast" id="forecast" style="display:none"></div>
    <div id="log-home">
      <div class="winlog" id="winlog"></div>
      <div class="winlog" id="blindlog"></div>
    </div>
    <div class="updated"><span class="dot"></span><span id="updated">checking…</span><span id="checked"></span></div>
    <button class="refresh-btn" id="refresh-btn" onclick="manualRefresh()">Refresh</button>
    <div class="chart-wrap" id="chart-wrap" style="display:none">
      <canvas id="temp-chart"></canvas>
    </div>
    <div class="model-accuracy" id="model-accuracy" style="display:none"></div>
    <div class="thermal" id="thermal-behaviour" style="display:none"></div>
    <div class="wetbulb" id="wetbulb" style="display:none">
      <div class="wetbulb-head">
        <span class="wetbulb-title" id="wetbulb-title">indoor air · how survivable it feels</span>
        <span class="wetbulb-value" id="wetbulb-value">—</span>
      </div>
      <div class="wetbulb-scale-wrap">
        <div class="wetbulb-scale"></div>
        <div class="wetbulb-peak" id="wetbulb-peak" style="display:none"></div>
        <div class="wetbulb-marker" id="wetbulb-marker"></div>
      </div>
      <div class="wetbulb-ticks">
        <span style="left:20%">comfortable</span>
        <span style="left:60%">muggy</span>
        <span style="left:90%">caution</span>
      </div>
      <div class="wetbulb-readout" id="wetbulb-readout"></div>
      <div class="wetbulb-foot" id="wetbulb-foot"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script>
    const GIST_API = "https://api.github.com/gists/45ba603447bbc3ec258e479f6dee6a20"

    const COPY = {
      open:    { label: "OPEN",  hint: "let the air through" },
      close:   { label: "CLOSE", hint: "hold the cool in" },
      unknown: { label: "—",     hint: "waiting for data" },
    }

    function fmtHour(h) {
      if (h == null) return "?"
      if (h === 0)  return "midnight"
      if (h < 12)  return `${h}am`
      if (h === 12) return "noon"
      return `${h - 12}pm`
    }

    function timeAgo(utcString) {
      if (!utcString) return "never updated"
      const diff = Math.floor((Date.now() - new Date(utcString).getTime()) / 60000)
      if (diff < 1) return "just now"
      if (diff < 60) return `${diff} min ago`
      return `${Math.floor(diff / 60)}h ago`
    }

    let lastData = null;
    let lastChecked = null;

    async function load() {
      try {
        const res = await fetch(GIST_API)
        const gist = await res.json()
        lastData = JSON.parse(gist.files["window-watch-status.json"].content)
        lastChecked = new Date()
        updateUI()
        const csvContent = gist.files["window-watch-history.csv"]?.content
        if (csvContent) renderChart(parseCSV(csvContent), lastData)
      } catch(e) {
        document.getElementById("hint").textContent = "couldn't load data"
      }
    }

    function parseCSV(text) {
      const lines = text.trim().split('\n')
      const headers = lines[0].split(',')
      return lines.slice(1).map(line => {
        const vals = line.split(',')
        const obj = {}
        headers.forEach((h, i) => obj[h.trim()] = vals[i]?.trim())
        return obj
      }).filter(r => r.timestamp).map(r => ({
        ts: new Date(r.timestamp).getTime(),
        outdoor: parseFloat(r.outdoor_c),
        indoor: parseFloat(r.indoor_c),
        status: r.status
      })).filter(r => !isNaN(r.outdoor) && !isNaN(r.indoor))
    }

    let _chart = null

    function renderChart(rows, d) {
      const cutoff = Date.now() - 24 * 60 * 60 * 1000
      const recent = rows.filter(r => r.ts >= cutoff)
      if (recent.length < 2) return

      // build close-period bands
      const bands = []
      let bStart = null
      recent.forEach(r => {
        if (r.status === 'close' && bStart == null) bStart = r.ts
        if (r.status !== 'close' && bStart != null) { bands.push([bStart, r.ts]); bStart = null }
      })
      if (bStart != null) bands.push([bStart, recent[recent.length - 1].ts])

      const outdoorHist = recent.map(r => ({ x: r.ts, y: r.outdoor }))
      const indoorHist  = recent.map(r => ({ x: r.ts, y: r.indoor  }))

      // Extend a line forward from the model's hourly projection, bias-corrected so it
      // joins the last real reading smoothly (the raw model can sit a touch off). idx is
      // the forecast_hourly column: 1 = outdoor, 2 = modelled indoor.
      function forecastLine(idx, lastVal) {
        const out = []
        if (!d.forecast_hourly || lastVal == null) return out
        const fmap = new Map(d.forecast_hourly.map(e => [e[0], e[idx]]))
        const lastHour = new Date(recent[recent.length - 1].ts).getHours()
        const atLast = fmap.get(lastHour)
        const bias = atLast != null ? lastVal - atLast : 0
        const nowH = new Date().getHours()
        for (let i = 0; i <= 6; i++) {
          const h = (nowH + i) % 24
          const fc = fmap.get(h)
          if (fc == null) continue
          const t = new Date(); t.setHours(h, 0, 0, 0)
          if (nowH + i >= 24) t.setDate(t.getDate() + 1)
          out.push({ x: t.getTime(), y: +(fc + bias).toFixed(1) })
        }
        return out
      }
      const lastRow = recent[recent.length - 1]
      const fcPoints = forecastLine(1, d.outdoor_c != null ? lastRow.outdoor : null)
      const fcIndoor = forecastLine(2, lastRow.indoor)

      const closeBandsPlugin = {
        id: 'closeBands',
        beforeDraw(chart) {
          const { ctx, chartArea: { top, bottom }, scales: { x } } = chart
          ctx.save()
          ctx.fillStyle = 'rgba(180, 50, 50, 0.18)'
          bands.forEach(([s, e]) => {
            const px0 = x.getPixelForValue(s)
            const px1 = x.getPixelForValue(e)
            ctx.fillRect(px0, top, px1 - px0, bottom - top)
          })
          ctx.restore()
        }
      }

      const wrap = document.getElementById('chart-wrap')
      wrap.style.display = ''
      if (_chart) { _chart.destroy(); _chart = null }

      _chart = new Chart(document.getElementById('temp-chart'), {
        type: 'line',
        plugins: [closeBandsPlugin],
        data: {
          datasets: [
            {
              label: 'Outdoor',
              data: outdoorHist,
              borderColor: '#ff8c8c',
              borderWidth: 2,
              pointRadius: 0,
              tension: 0.3,
              fill: false,
            },
            {
              label: 'Outdoor →',
              data: fcPoints,
              borderColor: 'rgba(255,140,140,0.5)',
              borderWidth: 1.5,
              borderDash: [4, 3],
              pointRadius: 0,
              tension: 0.3,
              fill: false,
            },
            {
              label: 'Indoor',
              data: indoorHist,
              borderColor: '#4db6ff',
              borderWidth: 2,
              pointRadius: 0,
              tension: 0.3,
              fill: false,
            },
            {
              label: 'Indoor →',
              data: fcIndoor,
              borderColor: 'rgba(77,182,255,0.5)',
              borderWidth: 1.5,
              borderDash: [4, 3],
              pointRadius: 0,
              tension: 0.3,
              fill: false,
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          animation: false,
          interaction: { mode: 'index', intersect: false },
          scales: {
            x: {
              type: 'linear',
              ticks: {
                color: 'rgba(255,255,255,0.3)',
                maxRotation: 0,
                maxTicksLimit: 6,
                callback(v) {
                  const dt = new Date(v), h = dt.getHours()
                  if (h === 0) return 'midnight'
                  if (h === 12) return 'noon'
                  return h < 12 ? `${h}am` : `${h-12}pm`
                }
              },
              grid: { color: 'rgba(255,255,255,0.05)' },
              border: { display: false }
            },
            y: {
              ticks: {
                color: 'rgba(255,255,255,0.3)',
                maxTicksLimit: 4,
                callback: v => `${v}°`
              },
              grid: { color: 'rgba(255,255,255,0.05)' },
              border: { display: false }
            }
          },
          plugins: {
            legend: {
              display: true,
              labels: {
                color: 'rgba(255,255,255,0.35)',
                boxWidth: 24,
                boxHeight: 2,
                font: { size: 11 },
                padding: 12
              }
            },
            tooltip: { enabled: false }
          }
        }
      })
    }

    const HYSTERESIS = 1.0  // reopen band — must match Python default
    const CLOSE_LEAD = 0.5  // anticipatory close margin — must match Python default

    // Wet-bulb thresholds (°C). The gauge runs from a fresh WB_MIN up to WB_DANGER,
    // where prolonged indoor exposure turns dangerous (the bar's 100%).
    const WB_DANGER = 28
    const WB_MIN = 18

    // Stull (2011) approximation — accurate to ~±0.65°C for typical indoor RH.
    function wetBulb(T, RH) {
      if (T == null || RH == null) return null
      RH = Math.max(1, Math.min(100, RH))
      return T * Math.atan(0.151977 * Math.sqrt(RH + 8.313659))
        + Math.atan(T + RH) - Math.atan(RH - 1.676331)
        + 0.00391838 * Math.pow(RH, 1.5) * Math.atan(0.023101 * RH)
        - 4.686035
    }

    // Translate wet-bulb into a 0–100 mugginess level — rises with the discomfort so
    // it reads the same direction as the word and the warm end of the scale. 0% = fresh
    // (≤18°), 100% = the 28° danger line; beyond that it's pinned at 100 and alerts.
    function muggyPct(wb) {
      return Math.round(Math.max(0, Math.min(100, (wb - WB_MIN) / (WB_DANGER - WB_MIN) * 100)))
    }

    // [word, colour] for the band the air is currently in.
    function comfortBand(wb) {
      if (wb < 22) return ["comfortable", "#7fd1ff"]
      if (wb < 26) return ["muggy",       "#e0c34a"]
      if (wb < 28) return ["caution",     "#e08a3c"]
      if (wb < 31) return ["danger",      "#e0584a"]
      return ["extreme", "#ff8c8c"]
    }

    function liveTemps(d) {
      // Outdoor ticks between refreshes by following the forecast *trend*, but it's
      // bias-corrected to the last real observed reading (outdoor_c) so it agrees
      // exactly with the value the decision/notification used at refresh time — the
      // raw forecast can run several degrees off. Indoor is always the real sensor.
      if (d.forecast_hourly && d.outdoor_c != null && d.updated_utc) {
        const fmap = new Map(d.forecast_hourly.map(e => [e[0], e[1]]))
        const updHour = new Date(d.updated_utc).getHours()
        const nowHour = new Date().getHours()
        const fcNow = fmap.get(nowHour), fcUpd = fmap.get(updHour)
        if (fcNow != null && fcUpd != null) {
          // observed + (how much the forecast says it's moved since the last refresh)
          return { outdoor: d.outdoor_c + (fcNow - fcUpd), indoor: d.indoor_est_c, isForecast: nowHour !== updHour }
        }
      }
      return { outdoor: d.outdoor_c, indoor: d.indoor_est_c, isForecast: false }
    }

    function updateUI() {
      if (!lastData) return
      const d = lastData
      const { outdoor, indoor, isForecast } = liveTemps(d)

      // Re-derive status from live temps so the display stays current between runs.
      // Asymmetric: close at the crossover (don't wait — late closing traps heat),
      // reopen only once genuinely cooler. In between, hold the server's decision.
      let s = d.status || "unknown"
      if (outdoor != null && indoor != null) {
        if (outdoor >= indoor)                   s = "close"
        else if (outdoor <= indoor - HYSTERESIS) s = "open"
      }
      const copy = COPY[s] || COPY.unknown

      document.body.className = s
      document.getElementById("status").textContent = copy.label
      document.getElementById("hint").textContent = copy.hint
      // Hero is the indoor↔outdoor gap — the number that actually drives the
      // open/close call — not the raw outdoor temperature.
      const tEl = document.getElementById("temp")
      const subEl = document.getElementById("temp-sub")
      if (outdoor != null && indoor != null) {
        const d0 = outdoor - indoor
        const sign = d0 >= 0 ? "+" : "−"
        tEl.innerHTML = `${isForecast ? "~" : ""}${sign}${Math.abs(d0).toFixed(1)}<span>°</span>`
        subEl.textContent =
          d0 >= 0 ? "warmer outside than in" :
          d0 <= -HYSTERESIS ? "cooler outside than in" :
          "barely cooler outside"
      } else {
        tEl.innerHTML = `—<span>°</span>`
        subEl.textContent = ""
      }
      const balance = document.getElementById("balance")
      if (outdoor != null && indoor != null) {
        balance.style.display = ""
        const RANGE = 8
        const delta = outdoor - indoor
        const pct = Math.min(95, Math.max(5, 50 + (delta / RANGE) * 50))
        // Hold zone sits between the reopen point (indoor - HYSTERESIS) and the
        // crossover (indoor, at centre) — to the right of centre means close.
        const deadPct = (HYSTERESIS / RANGE) * 50
        document.getElementById("balance-deadband").style.left = (50 - deadPct) + "%"
        document.getElementById("balance-deadband").style.width = deadPct + "%"
        const ball = document.getElementById("balance-ball")
        const fill = document.getElementById("balance-fill")
        ball.style.left = pct + "%"
        if (delta >= 0) {
          fill.style.left = "50%"; fill.style.width = (pct - 50) + "%"
          fill.style.background = "rgba(255,120,100,0.55)"; ball.style.background = "#ff8c8c"
        } else if (delta <= -HYSTERESIS) {
          fill.style.left = pct + "%"; fill.style.width = (50 - pct) + "%"
          fill.style.background = "rgba(77,182,255,0.55)"; ball.style.background = "#4db6ff"
        } else {
          fill.style.width = "0%"; ball.style.background = "rgba(255,255,255,0.65)"
        }
        document.getElementById("balance-indoor-label").textContent = `${isForecast ? "~" : ""}${indoor.toFixed(1)}°C inside`
        document.getElementById("balance-outdoor-label").textContent = `${isForecast ? "~" : ""}${outdoor.toFixed(1)}°C outside`
      } else {
        balance.style.display = "none"
      }

      // Wet-bulb gauge — needs real indoor temp + humidity from the Shelly.
      const wb = wetBulb(d.indoor_est_c, d.indoor_humidity_pct)
      const wbBox = document.getElementById("wetbulb")
      if (wb != null) {
        const est = !!d.indoor_estimated   // sensor offline → modelled temp + RH
        const pct = muggyPct(wb)
        const [word, colour] = comfortBand(wb)
        wbBox.style.display = ""
        document.getElementById("wetbulb-title").textContent =
          `indoor air at ${est ? "~" : ""}${d.indoor_est_c.toFixed(1)}°C`
        const val = document.getElementById("wetbulb-value")
        val.innerHTML = `${pct}% <span>· ${word}</span>`
        val.style.color = colour
        document.getElementById("wetbulb-marker").style.left = pct + "%"

        const readout = document.getElementById("wetbulb-readout")
        if (wb < 22) {
          readout.className = "wetbulb-readout"
          readout.textContent = "Air feels fresh — no heat stress"
        } else if (wb < 26) {
          readout.className = "wetbulb-readout"
          readout.textContent = "Muggy but safe — ventilate when you can"
        } else if (wb < 28) {
          readout.className = "wetbulb-readout"
          readout.textContent = "Getting oppressive — prioritise airflow and water"
        } else {
          readout.className = "wetbulb-readout alert"
          readout.textContent = "⚠ Heat-stress danger — ventilate, hydrate, avoid exertion"
        }

        // Today's projected peak — shown as a second, ghost marker on the same scale
        // ("how balmy will it get" from the engine), not as a separate line of text.
        const peakEl = document.getElementById("wetbulb-peak")
        if (d.wetbulb_max_c != null) {
          peakEl.style.display = ""
          peakEl.style.left = muggyPct(d.wetbulb_max_c) + "%"
          peakEl.title = `Today's peak: ${muggyPct(d.wetbulb_max_c)}% around ${fmtHour(d.wetbulb_peak_hour)}`
        } else {
          peakEl.style.display = "none"
        }

        // Keep the raw wet-bulb available, but demoted to a small technical footnote
        // so it doesn't read as just another room temperature.
        document.getElementById("wetbulb-foot").textContent =
          `${est ? "estimated " : ""}wet-bulb ${wb.toFixed(1)}°C`
      } else {
        wbBox.style.display = "none"
      }

      // Solar-gain advisory: sun through the glass is strong enough to overcome the
      // open windows even though it's cooler outside. solar_threshold = (a/b)·(in−out)
      // from the learned model; it's only set server-side when it's cooler out.
      const sNow = d.solar_now, sThr = d.solar_threshold, wThr = d.solar_window_threshold
      const blindsCard = document.getElementById("sa-blinds")
      const windowsCard = document.getElementById("sa-windows")
      const logHome = document.getElementById("log-home")
      const winlogEl = document.getElementById("winlog")
      const blindlogEl = document.getElementById("blindlog")
      const solarActive = s !== "close" && sNow != null && sThr != null && sNow >= sThr && sNow >= 80
      const windowsActive = solarActive && wThr != null && sNow >= wThr
      document.getElementById("sa-row").className = "sa-row" + (windowsActive ? " dual" : "")
      if (solarActive) {
        const gapTxt = (indoor != null && outdoor != null && indoor > outdoor)
          ? ` (it's ${(indoor - outdoor).toFixed(1)}° cooler out)` : ""
        blindsCard.style.display = ""
        document.getElementById("sa-blinds-text").innerHTML =
          `<div class="sa-icon">🕶</div>` +
          `<div class="sa-act"><b>Blinds down</b> — the sun is warming the room through the glass${gapTxt}</div>` +
          `<span class="sub">south-face sun now ${Math.round(sNow)} W/m² · blinds help past ~${sThr}` +
          (!windowsActive && wThr != null ? ` · windows can stay open — outside air is still cooler` : "") + `</span>`
        document.getElementById("sa-blinds-log").appendChild(blindlogEl)
      } else {
        blindsCard.style.display = "none"
      }
      if (windowsActive) {
        // Strong sun: the south wall is warming the air outside it too — shut windows.
        windowsCard.style.display = ""
        document.getElementById("sa-windows-text").innerHTML =
          `<div class="sa-icon">🪟</div>` +
          `<div class="sa-act"><b>Shut sunny-side windows</b> — the south wall is heating the air just outside, so venting that side adds heat</div>` +
          `<div class="sa-act soft">✅ Keep a shaded window open for airflow</div>` +
          `<span class="sub">worth shutting once south-face sun tops ~${wThr} W/m² — it's ${Math.round(sNow)} now</span>`
        document.getElementById("sa-windows-log").appendChild(winlogEl)
      } else {
        windowsCard.style.display = "none"
      }
      // Send the nudges back to their usual spot when not docked in a callout
      if (!windowsActive) logHome.appendChild(winlogEl)
      if (!solarActive) logHome.appendChild(blindlogEl)

      // Forecast block. The close time is frozen once it's passed (server-side),
      // so during the close period we show it as a "closed since" reference rather
      // than hiding it; reopen stays as the upcoming target.
      const fc = document.getElementById("forecast")
      const nowHour = new Date().getHours()
      const cH = d.forecast_close_hour, oH = d.forecast_open_hour
      const closeUpcoming = cH != null && cH >= nowHour
      const openUpcoming = oH != null && oH >= nowHour
      const peakLine = d.forecast_max_c != null && d.forecast_peak_hour != null
        ? `<div class="forecast-peak">Today peaks at ${d.forecast_max_c.toFixed(0)}°C around ${fmtHour(d.forecast_peak_hour)}</div>`
        : ""

      if (s === "close") {
        fc.style.display = ""
        fc.className = "forecast warn"
        let html = cH == null ? `Keep the windows shut`
          : closeUpcoming ? `Close before <strong>${fmtHour(cH)}</strong>`
          : `Closed since <strong>${fmtHour(cH)}</strong>`
        html += oH != null
          ? ` · open around <strong>${fmtHour(oH)}</strong>`
          : ` · may stay hot overnight`
        fc.innerHTML = html + peakLine
      } else if (closeUpcoming) {
        fc.style.display = ""
        fc.className = "forecast warn"
        let html = `Close before <strong>${fmtHour(cH)}</strong>`
        if (oH != null) html += ` · open around <strong>${fmtHour(oH)}</strong>`
        fc.innerHTML = html + peakLine
      } else if (openUpcoming) {
        fc.style.display = ""
        fc.className = "forecast"
        fc.innerHTML = `Open around <strong>${fmtHour(oH)}</strong>` + peakLine
      } else {
        fc.style.display = "none"
      }

      document.getElementById("updated").textContent = "data " + timeAgo(d.updated_utc)
      if (lastChecked) {
        const checkedDiff = Math.floor((Date.now() - lastChecked.getTime()) / 60000)
        const checkedStr = checkedDiff < 1 ? "checked just now" : `checked ${checkedDiff}m ago`
        document.getElementById("checked").textContent = "· " + checkedStr
      }

      // Model accuracy: one-step prediction error + how much data backs it. Confidence
      // grows with data volume and tightens as the error shrinks.
      const accEl = document.getElementById("model-accuracy")
      if (d.model_rmse != null && d.model_samples) {
        const rmse = d.model_rmse, n = d.model_samples
        let colour, word
        if (n >= 200 && rmse <= 0.4)      { colour = "#5cd6a0"; word = "high confidence" }
        else if (n >= 50)                 { colour = "#e0c34a"; word = "building confidence" }
        else                              { colour = "#9aa0a6"; word = "still learning" }
        const confirmed = d.model_confirmed || 0
        const covPct = n ? Math.round(confirmed / n * 100) : 0
        const nudge = covPct === 0
          ? "confirm your windows above to start unlocking a real open-vs-shut split"
          : `${covPct}% confirmed real — keep confirming to sharpen the open-vs-shut split`
        accEl.style.display = ""
        accEl.innerHTML =
          `<span class="dotc" style="background:${colour}"></span>` +
          `Model predicts the next reading within <strong>±${rmse.toFixed(2)}°C</strong> · ${word}` +
          `<span class="sub">from ${n.toLocaleString()} readings · ${nudge}</span>`
      } else {
        accEl.style.display = "none"
      }

      // Building behaviour. Always show the split-independent overall responsiveness
      // (honest even before real window states); only show the open-vs-shut split once
      // the server says it's trustworthy (enough confirmed states + physically sane).
      const t = d.thermal
      const thEl = document.getElementById("thermal-behaviour")
      if (t && t.overall_half_h) {
        thEl.style.display = ""
        const h = t.overall_half_h
        // Three traits, each a *behaviour of the flat* (not advice): its pace,
        // its relationship with the sun, and how it responds to being opened up.
        const be = d.blinds_effect
        const pace = h >= 16
          ? ["🐢 It moves slowly", "Built heavy — it takes about a day to catch up with the weather outside. Heatwaves reach you late, and hang around after they've broken."]
          : h >= 9
          ? ["🐢 It takes its time", "Inside drifts towards the outside temperature over most of a day."]
          : ["🐇 It reacts quickly", "Inside follows the outside temperature within a few hours."]
        const sunBody = `Strong sun warms it by ~${t.solar_c_hr}°C an hour through the south glass — even with every window shut.` +
          (be && be.ok && be.eff != null
            ? ` Your blinds block ~${Math.round(be.eff * 100)}% of that (measured).`
            : ` Blinds block most of that — log them on sunny days to measure exactly how much.`)
        let html = `<div class="th-title">how your flat behaves · learned from your data</div>` +
          `<div class="th-trait"><div class="th-trait-name">${pace[0]}</div><div class="th-trait-body">${pace[1]}</div></div>` +
          `<div class="th-trait"><div class="th-trait-name">☀️ It feels the sun</div><div class="th-trait-body">${sunBody}</div></div>`
        if (t.split_ok) {
          // Its one quick mode: proportional bars make the contrast scannable.
          const ratio = t.hold_ratio || (t.vent_pct && t.shut_pct ? Math.round(t.vent_pct / t.shut_pct * 10) / 10 : null)
          const shutW = t.vent_pct ? Math.max(8, Math.round((t.shut_pct / t.vent_pct) * 100)) : 20
          html +=
            `<div class="th-trait"><div class="th-trait-name">🌬 Windows change its pace</div>` +
            `<div class="th-trait-body">Open, it trades heat with outside ${ratio ? `~${ratio}× faster` : "far faster"} than sealed up — the biggest difference you can make.</div></div>` +
            `<div class="th-bar-row"><span class="th-bar-label">open</span>` +
              `<span class="th-bar-track"><span class="th-bar-fill" style="width:100%"></span></span></div>` +
            `<div class="th-bar-row"><span class="th-bar-label">shut</span>` +
              `<span class="th-bar-track"><span class="th-bar-fill slow" style="width:${shutW}%"></span></span></div>`
        } else {
          const cov = d.model_samples ? Math.round((d.model_confirmed || 0) / d.model_samples * 100) : 0
          html += `<div class="th-note">One more trait — how much windows change its pace — unlocks once enough real window states are logged (${cov}% so far). Confirm your windows above.</div>`
        }
        // Engineering figures on tap — the real coefficients, not the plain-English gloss.
        let eng = `<div class="th-row"><span>Overall half-life</span><span>~${h}h to halve an indoor–outdoor gap</span></div>` +
          `<div class="th-row"><span>Time constant τ</span><span>~${Math.round(h / 0.693)}h</span></div>`
        if (t.split_ok) {
          eng +=
            `<div class="th-row"><span>Windows open</span><span>loses ~${t.vent_pct}% of the gap/hr · half-life ~${t.vent_half_h}h</span></div>` +
            `<div class="th-row"><span>Windows shut</span><span>~${t.shut_pct}%/hr · half-life ~${t.shut_half_h}h · holds ~${t.hold_ratio}×</span></div>`
        }
        eng += `<div class="th-row"><span>Solar gain</span><span>+${t.solar_c_hr}°C/hr at full sun (~800 W/m²)</span></div>`
        if (be) {
          eng += be.ok && be.eff != null
            ? `<div class="th-row"><span>Blinds effect</span><span>−${Math.round(be.eff * 100)}% solar (${be.n_up} up · ${be.n_down} down pairs)</span></div>`
            : `<div class="th-row"><span>Blinds effect</span><span>seeded ~85% · measuring: ${be.n_up || 0} sunny up · ${be.n_down || 0} down (need ~30 each)</span></div>`
        }
        html += `<details><summary>the numbers</summary><div class="th-eng">${eng}</div></details>`
        thEl.innerHTML = html
      } else {
        thEl.style.display = "none"
      }

      // Window nudge: assumed state is the confirmed report (fresh) if any, else the
      // inferred recommendation. A tap in the last ~35 min stands until the next cycle
      // bakes it into the Gist.
      const inferred = s === "close" ? "closed" : "open"
      const recentTap = winLocal && (Date.now() - winLocalTs) < 35 * 60 * 1000
      const confirmedRegime = recentTap ? winLocal : (d.window_actual || null)
      renderWinlog(confirmedRegime || inferred, !!confirmedRegime)

      // Blinds nudge: default guess is "down" while the sun's strong enough to be heating
      // the flat (you'd shade), else "up"; a real report overrides it.
      const blindsInferred = (d.solar_threshold != null && d.solar_now != null &&
                              d.solar_now >= d.solar_threshold) ? "down" : "up"
      const recentBlindTap = blindLocal && (Date.now() - blindLocalTs) < 35 * 60 * 1000
      const confirmedBlind = recentBlindTap ? blindLocal : (d.blinds_actual || null)
      renderBlindlog(confirmedBlind || blindsInferred, !!confirmedBlind)
    }

    // The window control is a nudge, not a persistent toggle: it states the current
    // assumption and asks you to confirm or correct it. `confirmed` = backed by a real
    // report (fresh), vs running on the inferred recommendation.
    function renderWinlog(assumed, confirmed) {
      const el = document.getElementById("winlog")
      const state = assumed === "closed" ? "shut" : "open"
      const opp   = assumed === "closed" ? "open" : "shut"
      if (confirmed) {
        el.className = "winlog confirmed"
        el.innerHTML =
          `<span class="wl-state">🪟 windows <b>${state}</b> · confirmed</span>` +
          `<button class="wl-mini" onclick="logWindow('${opp}')">now ${opp}?</button>`
      } else {
        el.className = "winlog nudge"
        el.innerHTML =
          `<span class="wl-q">windows <b>${state}</b> right now?</span>` +
          `<button class="wl-btn" onclick="logWindow('${state}')">yes</button>` +
          `<button class="wl-btn ghost" onclick="logWindow('${opp}')">no, ${opp}</button>`
      }
    }

    // Blinds nudge — mirrors the windows one. State is "down" (shaded) / "up" (exposed).
    function renderBlindlog(assumed, confirmed) {
      const el = document.getElementById("blindlog")
      const state = assumed === "down" ? "down" : "up"
      const opp   = assumed === "down" ? "up" : "down"
      if (confirmed) {
        el.className = "winlog confirmed"
        el.innerHTML =
          `<span class="wl-state">🕶️ blinds <b>${state}</b> · confirmed</span>` +
          `<button class="wl-mini" onclick="logBlind('${opp}')">now ${opp}?</button>`
      } else {
        el.className = "winlog nudge"
        el.innerHTML =
          `<span class="wl-q">south blinds <b>${state}</b> right now?</span>` +
          `<button class="wl-btn" onclick="logBlind('${state}')">yes</button>` +
          `<button class="wl-btn ghost" onclick="logBlind('${opp}')">no, ${opp}</button>`
      }
    }

    let blindLocal = null, blindLocalTs = 0, blindPending = false
    async function logBlind(state) {
      blindLocal = state === "down" ? "down" : "up"
      blindLocalTs = Date.now()
      renderBlindlog(blindLocal, true)
      if (blindPending) return
      blindPending = true
      try {
        await fetch("https://window-watch-ollie.fly.dev/blinds?state=" + state, {
          method: "POST",
          headers: { "Authorization": "Bearer yKkEP4_tiXaXMUh9AR-fkALJjHNHtK6D" },
        })
      } catch (_) { /* optimistic UI already updated; next cycle reconciles */ }
      blindPending = false
    }

    let winLocal = null, winLocalTs = 0, winPending = false
    async function logWindow(state) {
      // Optimistic: reflect the tap immediately as a confirmed state; the runner bakes it
      // into the log/Gist next cycle. Remember it so a poll in the gap doesn't clobber it.
      winLocal = state === "open" ? "open" : "closed"
      winLocalTs = Date.now()
      renderWinlog(winLocal, true)
      if (winPending) return
      winPending = true
      try {
        await fetch("https://window-watch-ollie.fly.dev/window?state=" + state, {
          method: "POST",
          headers: { "Authorization": "Bearer yKkEP4_tiXaXMUh9AR-fkALJjHNHtK6D" },
        })
      } catch (_) { /* optimistic UI already updated; next cycle reconciles */ }
      winPending = false
    }

    async function manualRefresh() {
      const btn = document.getElementById("refresh-btn")
      btn.disabled = true
      btn.textContent = "Refreshing…"
      document.getElementById("checked").textContent = ""

      // Ask the Fly runner to do a full refresh (both weather API + Shelly)
      try {
        await fetch("https://window-watch-ollie.fly.dev/refresh", {
          method: "POST",
          headers: { "Authorization": "Bearer yKkEP4_tiXaXMUh9AR-fkALJjHNHtK6D" },
        })
        // Give the runner a moment to fetch APIs and write the Gist
        await new Promise(r => setTimeout(r, 4000))
      } catch (_) { /* fall through to re-read existing Gist */ }

      await load()
      btn.textContent = "Refresh"
      btn.disabled = false
    }

    load()
    // Fetch new data every 10 minutes
    setInterval(load, 10 * 60 * 1000)
    // Update the "time ago" string every 60 seconds
    setInterval(updateUI, 60000)
  </script>
</body>
</html>
